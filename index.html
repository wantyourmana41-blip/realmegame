<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>realme Game Day</title>

<style>
:root{
  --realme:#FFD400;
  --card:#ffffff;
}

body{
  margin:0;
  background:var(--realme);
  font-family:Arial, sans-serif;
  text-align:center;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

canvas{
  background:#f5f5f5;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
  width:100%;
  height:420px;
  max-height:520px;
}

input{
  width:90%;
  padding:12px;
  font-size:16px;
  border-radius:25px;
  border:none;
  margin:15px 0;
}

button{
  padding:14px 40px;
  font-size:18px;
  border-radius:30px;
  border:none;
  cursor:pointer;
  margin:8px;
}

.start{
  background:black;
  color:white;
}

.secondary{
  background:white;
}

@media(max-width:768px){
  canvas{
    height:55vh;
    min-height:360px;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>realme Game Day</h1>

<input id="playerName" placeholder="กรอกชื่อก่อนเล่น">

<canvas id="game" width="900" height="420"></canvas>

<br>
<button class="start" onclick="startGame()">Start</button>
<button class="secondary" onclick="location.reload()">Reset</button>

<h3>Score: <span id="score">0</span></h3>

</div>

<script>

/* ====== ใส่ URL ของคุณตรงนี้ ====== */
const SCRIPT_URL = "ใส่ exec URL ของคุณตรงนี้";
const SCRIPT_URL_LINE = "ใส่ googleusercontent URL ของคุณตรงนี้";
/* ================================== */

function pickScript(){
  const isLINE = /Line/i.test(navigator.userAgent);
  if(isLINE && SCRIPT_URL_LINE.includes("googleusercontent")){
    return SCRIPT_URL_LINE;
  }
  return SCRIPT_URL;
}

/* ====== GAME ====== */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {x:50,y:350,w:40,h:40,vy:0,jumpCount:0};
let gravity = 0.8;
let obstacles = [];
let score = 0;
let running = false;

function startGame(){
  if(!document.getElementById("playerName").value.trim()) return alert("กรอกชื่อก่อน");
  running = true;
  score = 0;
  obstacles = [];
  player.y=350;
  player.vy=0;
  player.jumpCount=0;
  loop();
}

function loop(){
  if(!running) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  player.vy+=gravity;
  player.y+=player.vy;

  if(player.y>350){
    player.y=350;
    player.vy=0;
    player.jumpCount=0;
  }

  ctx.fillStyle="black";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  if(Math.random()<0.02){
    obstacles.push({x:900,y:350,w:30,h:40});
  }

  obstacles.forEach(o=>{
    o.x-=5;
    ctx.fillRect(o.x,o.y,o.w,o.h);

    if(o.x<player.x+player.w &&
       o.x+o.w>player.x &&
       o.y<player.y+player.h &&
       o.y+o.h>player.y){
         endGame();
       }
  });

  obstacles = obstacles.filter(o=>o.x>-50);

  score++;
  document.getElementById("score").innerText=score;

  requestAnimationFrame(loop);
}

function endGame(){
  running=false;
  submitScore();
}

function jump(){
  if(player.jumpCount<2){
    player.vy=-12;
    player.jumpCount++;
  }
}

document.addEventListener("keydown",e=>{
  if(e.code==="Space") jump();
});

/* ====== Submit Score (LINE SAFE) ====== */

function submitScore(){
  const base = pickScript();
  const name = document.getElementById("playerName").value.trim();
  const url = `${base}?name=${encodeURIComponent(name)}&score=${score}&_=${Date.now()}`;

  if(navigator.sendBeacon){
    navigator.sendBeacon(url,new Blob(["1"],{type:"text/plain"}));
  }

  fetch(url,{mode:"no-cors",keepalive:true}).catch(()=>{});

  const img=new Image();
  img.src=url;
}

</script>

</body>
</html>
