<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>realme Game Day</title>

<style>

body{
margin:0;
background:#FFD400;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
margin-top:20px;
}

.container{
max-width:500px;
margin:auto;
}

canvas{
background:white;
border-radius:15px;
margin-top:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

input{
width:80%;
padding:10px;
border-radius:20px;
border:none;
margin-top:15px;
font-size:16px;
}

button{
padding:12px 30px;
border-radius:25px;
border:none;
font-size:16px;
margin:10px;
cursor:pointer;
}

.start{
background:black;
color:white;
}

.reset{
background:white;
}

.score{
font-weight:bold;
margin-top:10px;
}

.leaderboard{
margin-top:20px;
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.leaderboard div{
padding:6px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>realme Game Day</h1>

<div class="container">

<input id="playerName" placeholder="ชื่อผู้เล่น">

<br>

<canvas id="game" width="400" height="200"></canvas>

<br>

<button class="start" onclick="startGame()">Start</button>
<button class="reset" onclick="resetGame()">Reset</button>

<div class="score">Score: <span id="score">0</span></div>

<div class="leaderboard">
<h3>🏆 Top 10 Players</h3>
<div id="leaderboard"></div>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbytcLTpTk0krAlJaUKYLJPh6O6jLn_pDe0jQJYjDttbWxyb2avxzW2p6gC9lxA1T59q/exec";

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let player={x:40,y:160,w:20,h:20,vy:0};
let obstacle={x:400,y:170,w:20,h:20};

let gravity=0.6;
let jumping=false;

let score=0;
let running=false;
let speed=4;

let lastSubmit=0;

function startGame(){

running=true;
score=0;

loop();

}

function resetGame(){

location.reload();

}

function jump(){

if(!jumping){

player.vy=-10;
jumping=true;

}

}

function slide(){

player.h=10;

setTimeout(()=>{

player.h=20;

},400);

}

document.addEventListener("keydown",e=>{

if(e.code==="Space") jump();
if(e.key==="s") slide();

});

canvas.addEventListener("touchstart",()=>{

jump();

});

function loop(){

if(!running) return;

ctx.clearRect(0,0,400,200);

player.vy+=gravity;
player.y+=player.vy;

if(player.y>160){

player.y=160;
jumping=false;

}

ctx.fillRect(player.x,player.y,player.w,player.h);

obstacle.x-=speed;

if(obstacle.x<-20){

obstacle.x=420;
score+=2;

}

ctx.fillRect(obstacle.x,obstacle.y,obstacle.w,obstacle.h);

if(player.x < obstacle.x + obstacle.w &&
player.x + player.w > obstacle.x &&
player.y < obstacle.y + obstacle.h &&
player.y + player.h > obstacle.y){

gameOver();

return;

}

document.getElementById("score").innerText=score;

requestAnimationFrame(loop);

}

function gameOver(){

running=false;

submitScore();

}

function submitScore(){

let name=document.getElementById("playerName").value;

if(!name){

alert("กรุณาใส่ชื่อ");

return;

}

if(Date.now()-lastSubmit<10000){

alert("รอสักครู่ก่อนส่งคะแนนอีกครั้ง");

return;

}

lastSubmit=Date.now();

fetch(API+"?name="+encodeURIComponent(name)+"&score="+score);

showRank(name,score);

loadLeaderboard();

}

async function showRank(name,score){

const res=await fetch(API+"?action=top&limit=50");
const data=await res.json();

let rank=data.top.findIndex(p=>p.name==name && p.score==score)+1;

if(rank<=0) rank="50+";

let reward="—";

if(score>=400) reward="realme speaker";
else if(score>=200) reward="realme bag";
else if(score>=100) reward="Voucher discount 333";

alert(
"GAME OVER\n\n"+
"Score: "+score+"\n"+
"Rank: "+rank+"\n"+
"Reward: "+reward
);

}

async function loadLeaderboard(){

const res=await fetch(API+"?action=top&limit=10");
const data=await res.json();

const board=document.getElementById("leaderboard");

board.innerHTML="";

data.top.forEach((p,i)=>{

const div=document.createElement("div");

div.innerHTML=(i+1)+". "+p.name+" — "+p.score;

board.appendChild(div);

});

}

loadLeaderboard();

</script>

</body>
</html>
