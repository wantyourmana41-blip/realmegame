<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>realme Jump Challenge</title>

<style>
:root{
  --realme-yellow:#FFD400;
}

html,body{
  margin:0;
  padding:0;
  background:var(--realme-yellow);
  font-family:Arial, sans-serif;
  text-align:center;
  overflow:hidden;
  touch-action:manipulation;
}

.logo{
  font-size:48px;
  font-weight:900;
  margin-top:20px;
}

canvas{
  background:#fff;
  border-radius:20px;
  margin:20px auto;
  display:block;
  max-width:95vw;
}

button{
  background:#FFD400;
  border:none;
  border-radius:30px;
  font-size:24px;
  font-weight:700;
  padding:20px 40px;
  min-width:200px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  cursor:pointer;
  transition:.2s;
}

button:active{
  transform:scale(.95);
}
</style>
</head>

<body>

<div class="logo">realme</div>

<canvas id="game" width="900" height="350"></canvas>

<br>
<button onclick="startGame()">Start</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {x:100,y:250,w:40,h:40,vy:0,jumps:0};
let gravity=0.8;
let obstacles=[];
let sliding=false;
let running=false;

function startGame(){
  running=true;
  player.y=250;
  player.vy=0;
  player.jumps=0;
  obstacles=[];
}

function jump(){
  if(player.jumps<2){
    player.vy=-12;
    player.jumps++;
  }
}

function setSlide(state){
  sliding=state;
  player.h = state ? 20 : 40;
}

function spawnObstacle(){
  obstacles.push({x:canvas.width,y:250,w:30,h:40});
}

setInterval(spawnObstacle,2000);

function update(){
  if(!running) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  player.vy+=gravity;
  player.y+=player.vy;

  if(player.y>=250){
    player.y=250;
    player.vy=0;
    player.jumps=0;
  }

  ctx.fillStyle="black";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  for(let i=0;i<obstacles.length;i++){
    obstacles[i].x-=6;
    ctx.fillRect(obstacles[i].x,obstacles[i].y,obstacles[i].w,obstacles[i].h);

    if(player.x<obstacles[i].x+obstacles[i].w &&
       player.x+player.w>obstacles[i].x &&
       player.y<obstacles[i].y+obstacles[i].h &&
       player.y+player.h>obstacles[i].y){
         running=false;
         alert("Game Over");
    }
  }

  requestAnimationFrame(update);
}

update();


// =======================
// 🔥 MOBILE FULL SCREEN TOUCH CONTROL
// =======================

let holdTimer=null;
let holding=false;

document.addEventListener("touchstart", function(e){
  e.preventDefault();
  holding=false;
  holdTimer=setTimeout(()=>{
    holding=true;
    setSlide(true);
  },150);
},{passive:false});

document.addEventListener("touchend", function(e){
  e.preventDefault();
  clearTimeout(holdTimer);
  if(holding){
    setSlide(false);
  }else{
    jump();
  }
},{passive:false});

// Desktop
document.addEventListener("pointerdown", function(e){
  if(e.target.tagName==="BUTTON") return;
  jump();
});
</script>

</body>
</html>
