<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>realme Jump Challenge</title>

<style>
  :root{
    --realme-yellow:#FFD400;
    --ink:#111;
    --card:#ffffff;
    --shadow: rgba(0,0,0,.18);
    --muted: rgba(0,0,0,.65);
  }
  *{box-sizing:border-box}
  html,body{
    height:100%;
    margin:0;
    background:var(--realme-yellow);
    font-family: Arial, sans-serif;
    text-align:center;
    overflow:hidden;
    overscroll-behavior:none;
    touch-action:manipulation;
    -webkit-user-select:none;
    user-select:none;
  }

  .logo{
    font-size:56px;
    font-weight:900;
    color:var(--ink);
    margin-top:18px;
    letter-spacing:.5px;
  }
  .subtitle{
    margin:4px 0 10px;
    color:rgba(0,0,0,.7);
    font-size:14px;
  }

  .panel{
    width:min(96vw, 980px);
    margin:0 auto;
    background:rgba(255,255,255,.58);
    border-radius:22px;
    padding:14px 14px 12px;
    box-shadow:0 16px 34px var(--shadow);
  }

  .hud{
    display:flex;
    gap:10px;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:10px;
  }
  .pill{
    flex:1;
    min-width:150px;
    background:rgba(255,255,255,.78);
    border-radius:999px;
    padding:10px 14px;
    display:flex;
    gap:10px;
    justify-content:center;
    align-items:center;
    box-shadow:0 8px 18px rgba(0,0,0,.08);
  }
  .pill small{color:var(--muted); font-weight:800}
  .pill b{font-size:18px}

  canvas{
    width:min(96vw, 940px);
    height:auto;
    background:#fff;
    border-radius:18px;
    display:block;
    margin:0 auto;
    box-shadow:0 10px 28px rgba(0,0,0,.12);
    touch-action:none;
  }

  .hint{
    margin:10px 0 0;
    font-size:14px;
    color:rgba(0,0,0,.78);
    line-height:1.35;
  }
  .hint strong{color:#000}

  .btnrow{
    display:flex;
    gap:12px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:12px;
  }

  /* BIG PREMIUM BUTTON */
  button{
    background:var(--realme-yellow);
    color:var(--ink);
    border:none;
    border-radius:28px;
    font-size:22px;
    font-weight:800;
    padding:18px 45px;
    min-width:190px;
    min-height:64px;
    box-shadow:0 10px 25px rgba(0,0,0,.22);
    cursor:pointer;
    transition:all .18s ease;
  }
  button.secondary{ background:#fff; }
  button:active{
    transform:scale(.96);
    box-shadow:0 6px 16px rgba(0,0,0,.28);
  }

  @media (max-width:768px){
    button{
      width:85%;
      font-size:26px;
      padding:22px 0;
      border-radius:35px;
    }
    .pill{min-width:0}
    .logo{font-size:48px}
  }

  /* Hold indicator */
  .holdbar{
    margin:10px auto 0;
    width:min(96vw, 940px);
    height:10px;
    border-radius:999px;
    background:rgba(255,255,255,.65);
    overflow:hidden;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.06);
  }
  .holdfill{
    height:100%;
    width:0%;
    background:rgba(0,0,0,.85);
    border-radius:999px;
    transition:width .08s linear;
  }

  /* Overlay */
  #overlay{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.55);
    padding:16px;
  }
  .modal{
    width:min(92vw, 560px);
    background:rgba(255,255,255,.92);
    border-radius:26px;
    padding:18px 18px 16px;
    box-shadow:0 18px 50px rgba(0,0,0,.35);
  }
  .modal h1{
    margin:6px 0 6px;
    font-size:44px;
    letter-spacing:1px;
  }
  .modal p{
    margin:0;
    color:rgba(0,0,0,.75);
    font-size:18px;
    line-height:1.35;
  }
  .modal .scoreline{
    margin-top:10px;
    font-size:18px;
    font-weight:900;
  }
</style>
</head>

<body>
  <div class="logo">realme</div>
  <div class="subtitle">Jump • Double Jump • Slide • Collect Stars</div>

  <div class="panel">
    <div class="hud">
      <div class="pill"><small>Score</small><b id="score">0</b></div>
      <div class="pill"><small>Goal</small><b id="goal">25</b></div>
      <div class="pill"><small>High</small><b id="high">0</b></div>
    </div>

    <canvas id="game" width="920" height="360"></canvas>
    <div class="holdbar"><div class="holdfill" id="holdfill"></div></div>

    <div class="hint">
      <div><strong>มือถือ:</strong> แตะตรงไหนก็ได้ = Jump (2x) • กดค้าง = Slide</div>
      <div><strong>คอม:</strong> Space/Click = Jump (2x) • Hold S/↓ = Slide</div>
      <div>เก็บดาว = <strong>+2</strong> คะแนน</div>
    </div>

    <div class="btnrow">
      <button id="startBtn">Start</button>
      <button class="secondary" id="howBtn">How to play</button>
    </div>
  </div>

  <div id="overlay">
    <div class="modal">
      <h1 id="ovTitle">GAME OVER</h1>
      <p id="ovDesc">โดนสิ่งกีดขวางแล้ว 😭</p>
      <div class="scoreline">คะแนน: <span id="ovScore">0</span> / <span id="ovGoal">25</span></div>
      <div class="btnrow" style="margin-top:14px">
        <button id="playAgainBtn">Play Again</button>
        <button class="secondary" id="closeBtn">Close</button>
      </div>
    </div>
  </div>

<script>
/* =========================
   realme Jump Challenge (stable)
   - Fix: double jump on mobile
   - Fix: no duplicate events (touch vs pointer)
   - Tap anywhere = jump, hold = slide
   - Stars +2, survive +1
   ========================= */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const goalEl  = document.getElementById("goal");
const highEl  = document.getElementById("high");
const holdFillEl = document.getElementById("holdfill");

const startBtn = document.getElementById("startBtn");
const howBtn = document.getElementById("howBtn");

const overlay = document.getElementById("overlay");
const ovTitle = document.getElementById("ovTitle");
const ovDesc  = document.getElementById("ovDesc");
const ovScore = document.getElementById("ovScore");
const ovGoal  = document.getElementById("ovGoal");
const playAgainBtn = document.getElementById("playAgainBtn");
const closeBtn = document.getElementById("closeBtn");

const IS_TOUCH = ("ontouchstart" in window) || (navigator.maxTouchPoints > 0);

// config
const GOAL = 25;
goalEl.textContent = GOAL;
ovGoal.textContent = GOAL;

let highScore = Number(localStorage.getItem("realme_highscore") || 0);
highEl.textContent = highScore;

let running = false;
let lastTime = 0;
let score = 0;

const groundY = 285;
const speedBase = 420;

const player = {
  x: 120,
  y: groundY - 46,
  w: 46,
  h: 46,
  vy: 0,
  jumps: 0,
  sliding:false,
  slideH: 26,
  normalH: 46
};

const gravity = 2200;
const jumpVel = -820;

let obstacles = [];
let stars = [];
let spawnT = 0;
let starSpawnT = 0;

function resetGame(){
  running = false;
  score = 0;
  scoreEl.textContent = score;

  player.y = groundY - player.normalH;
  player.h = player.normalH;
  player.vy = 0;
  player.jumps = 0;
  player.sliding = false;

  obstacles = [];
  stars = [];

  spawnT = 0;
  starSpawnT = 0;
  surviveAcc = 0;
  holdFillEl.style.width = "0%";
}

function startGame(){
  resetGame();
  running = true;
  overlay.style.display = "none";
  lastTime = 0;
  requestAnimationFrame(loop);
}

function endGame(type){
  running = false;

  if(score > highScore){
    highScore = score;
    localStorage.setItem("realme_highscore", String(highScore));
    highEl.textContent = highScore;
  }

  if(type === "win"){
    ovTitle.textContent = "YOU WIN!";
    ovDesc.textContent = "ยินดีด้วย! คุณเป็น realme FAN 🎉";
  }else{
    ovTitle.textContent = "GAME OVER";
    ovDesc.textContent = "โดนสิ่งกีดขวางแล้ว 😭";
  }

  ovScore.textContent = score;
  overlay.style.display = "flex";
}

function addScore(n){
  score += n;
  scoreEl.textContent = score;
  if(score >= GOAL){
    endGame("win");
  }
}

function jump(){
  if(!running) return;
  if(player.jumps < 2){
    player.vy = jumpVel;
    player.jumps++;
  }
}

function setSlide(on){
  if(!running) return;
  player.sliding = on;
  player.h = on ? player.slideH : player.normalH;
  if(player.y + player.h > groundY){
    player.y = groundY - player.h;
  }
}

// spawn
function spawnObstacle(){
  const r = Math.random();
  let type = "mid";
  if(r < 0.38) type = "low";
  else if(r < 0.75) type = "tall";

  let w = 26, h = 46;
  if(type === "low"){ w = 34; h = 36; }
  if(type === "tall"){ w = 22; h = 84; }

  obstacles.push({
    x: canvas.width + 30,
    y: groundY - h,
    w, h, type
  });
}

function spawnStar(){
  const lanes = [groundY - 120, groundY - 165, groundY - 90];
  const y = lanes[(Math.random()*lanes.length)|0];
  stars.push({ x: canvas.width + 30, y, r: 12, taken:false });
}

function aabb(ax,ay,aw,ah, bx,by,bw,bh){
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function roundRect(x,y,w,h,r){
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawBackground(){
  const g = ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,"#fff7c9");
  g.addColorStop(1,"#ffffff");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "rgba(0,0,0,.85)";
  ctx.fillRect(0, groundY, canvas.width, 4);

  ctx.strokeStyle = "rgba(0,0,0,.18)";
  ctx.lineWidth = 3;
  ctx.setLineDash([14,12]);
  ctx.beginPath();
  ctx.moveTo(0, groundY-26);
  ctx.lineTo(canvas.width, groundY-26);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawPlayer(){
  const px = player.x, py = player.y, w = player.w, h = player.h;

  ctx.fillStyle = "rgba(0,0,0,.12)";
  ctx.beginPath();
  ctx.ellipse(px + w/2, groundY + 12, w/2.2, 10, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "#111";
  roundRect(px, py, w, h, 14); ctx.fill();

  ctx.fillStyle = "#0f2b3a";
  roundRect(px+6, py+6, w-12, Math.max(10,h-16), 10); ctx.fill();

  ctx.fillStyle = "#FFD400";
  ctx.font = "bold 12px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("realme", px + w/2, py + h/2);
}

function drawObstacle(o){
  ctx.fillStyle = "rgba(0,0,0,.92)";
  roundRect(o.x, o.y, o.w, o.h, 12);
  ctx.fill();
}

function drawStar(s){
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.fillStyle = "rgba(255,212,0,.35)";
  ctx.beginPath();
  ctx.arc(0,0,20,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "#FFD400";
  ctx.beginPath();
  const spikes=5, outerR=12, innerR=5.5;
  let rot = Math.PI/2 * 3;
  let step = Math.PI / spikes;
  ctx.moveTo(0, -outerR);
  for(let i=0;i<spikes;i++){
    ctx.lineTo(Math.cos(rot)*outerR, Math.sin(rot)*outerR); rot += step;
    ctx.lineTo(Math.cos(rot)*innerR, Math.sin(rot)*innerR); rot += step;
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

let surviveAcc = 0;
function tickSurvive(dt){
  surviveAcc += dt;
  if(surviveAcc >= 0.7){
    surviveAcc = 0;
    addScore(1);
  }
}

function loop(t){
  if(!running) return;

  const dt = Math.min(0.033, (t - lastTime)/1000 || 0);
  lastTime = t;

  const speed = speedBase + Math.min(260, score * 12);

  spawnT += dt;
  starSpawnT += dt;

  if(spawnT > (1.15 + Math.random()*0.6)){
    spawnObstacle();
    spawnT = 0;
  }
  if(starSpawnT > (1.0 + Math.random()*1.2)){
    spawnStar();
    starSpawnT = 0;
  }

  // physics
  player.vy += gravity * dt;
  player.y += player.vy * dt;

  if(player.y + player.h >= groundY){
    player.y = groundY - player.h;
    player.vy = 0;
    player.jumps = 0; // ✅ reset jumps only when grounded
  }

  // move
  for(const o of obstacles) o.x -= speed * dt;
  obstacles = obstacles.filter(o => o.x + o.w > -30);

  for(const s of stars) s.x -= (speed * 0.95) * dt;
  stars = stars.filter(s => s.x > -40 && !s.taken);

  // collisions
  for(const o of obstacles){
    if(aabb(player.x, player.y, player.w, player.h, o.x, o.y, o.w, o.h)){
      endGame("lose"); return;
    }
  }
  for(const s of stars){
    const bx = s.x - s.r, by = s.y - s.r, bw = s.r*2, bh = s.r*2;
    if(aabb(player.x, player.y, player.w, player.h, bx, by, bw, bh)){
      s.taken = true;
      addScore(2);
    }
  }

  tickSurvive(dt);

  // render
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBackground();
  for(const s of stars) drawStar(s);
  for(const o of obstacles) drawObstacle(o);
  drawPlayer();

  requestAnimationFrame(loop);
}

/* =========================
   INPUT (Stable)
   Mobile: touch only (no pointer duplicate)
   Desktop: pointer + keyboard
   ========================= */
let holdTimer = null;
let holding = false;
let holdStart = 0;
let holdRAF = null;
const HOLD_MS = 160;

function startHoldUI(){
  holdStart = performance.now();
  cancelAnimationFrame(holdRAF);
  const step = () => {
    const p = Math.min(1, (performance.now() - holdStart) / HOLD_MS);
    holdFillEl.style.width = (p*100).toFixed(0) + "%";
    if(p < 1) holdRAF = requestAnimationFrame(step);
  };
  holdRAF = requestAnimationFrame(step);
}
function resetHoldUI(){
  cancelAnimationFrame(holdRAF);
  holdFillEl.style.width = "0%";
}

function onTouchStart(e){
  e.preventDefault();
  if(e.target.closest("button")) return;

  if(!running){
    startGame();
    // ให้เริ่มแล้วกระโดดได้ทันที 1 ครั้ง
    setTimeout(() => jump(), 0);
    return;
  }

  holding = false;
  startHoldUI();
  clearTimeout(holdTimer);
  holdTimer = setTimeout(() => {
    holding = true;
    setSlide(true);
  }, HOLD_MS);
}

function onTouchEnd(e){
  e.preventDefault();
  if(e.target.closest("button")) return;

  clearTimeout(holdTimer);
  resetHoldUI();

  if(!running) return;

  if(holding){
    setSlide(false);
  }else{
    jump();
  }
  holding = false;
}

document.addEventListener("touchstart", onTouchStart, {passive:false});
document.addEventListener("touchend", onTouchEnd, {passive:false});
document.addEventListener("touchcancel", onTouchEnd, {passive:false});

// Desktop pointer (disable on touch devices to avoid duplicate)
document.addEventListener("pointerdown", (e) => {
  if(IS_TOUCH) return;
  if(e.target.closest("button")) return;
  if(!running){ startGame(); return; }
  jump();
});

// Keyboard
document.addEventListener("keydown", (e) => {
  if(e.code === "Space"){
    e.preventDefault();
    if(!running){ startGame(); return; }
    jump();
  }
  if(e.code === "KeyS" || e.code === "ArrowDown"){
    e.preventDefault();
    if(running) setSlide(true);
  }
});
document.addEventListener("keyup", (e) => {
  if(e.code === "KeyS" || e.code === "ArrowDown"){
    e.preventDefault();
    if(running) setSlide(false);
  }
});

/* UI buttons */
startBtn.addEventListener("click", () => startGame());
playAgainBtn.addEventListener("click", () => startGame());
closeBtn.addEventListener("click", () => overlay.style.display = "none");
howBtn.addEventListener("click", () => {
  overlay.style.display = "flex";
  ovTitle.textContent = "HOW TO PLAY";
  ovDesc.textContent = "แตะ = Jump • แตะซ้ำได้ (Double Jump) • กดค้าง = Slide • เก็บดาว +2";
  ovScore.textContent = score;
});

// init screen
resetGame();
drawBackground();
drawPlayer();
</script>
</body>
</html>
