<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>realme Game Day</title>

<style>

body{
margin:0;
background:#FFD400;
font-family:Arial;
text-align:center;
}

h1{
margin-top:15px;
}

#game{
background:#fff;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.container{
width:95%;
max-width:900px;
margin:auto;
}

input{
padding:10px;
border-radius:20px;
border:none;
width:220px;
margin-top:10px;
}

button{
padding:12px 30px;
border:none;
border-radius:25px;
margin:10px;
font-size:16px;
cursor:pointer;
}

.start{
background:black;
color:white;
}

.reset{
background:white;
}

.score{
font-weight:bold;
font-size:18px;
}

.leaderboard{
background:white;
padding:20px;
border-radius:15px;
margin-top:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<h1>realme Game Day</h1>

<input id="playerName" placeholder="ชื่อผู้เล่น">

<br><br>

<div class="container">
<canvas id="game" width="900" height="350"></canvas>
</div>

<br>

<button class="start" onclick="startGame()">Start</button>
<button class="reset" onclick="resetGame()">Reset</button>

<div class="score">
Score: <span id="score">0</span>
</div>

<div class="leaderboard">
<h3>🏆 Top 10 Players</h3>
<div id="leaderboard"></div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbytcLTpTk0krAlJaUKYLJPh6O6jLn_pDe0jQJYjDttbWxyb2avxzW2p6gC9lxA1T59q/exec";

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let player={x:100,y:260,w:40,h:40,vy:0};
let gravity=0.8;
let jumping=false;

let obstacles=[];
let stars=[];

let score=0;
let running=false;
let speed=6;

function startGame(){

running=true;
score=0;

obstacles=[];
stars=[];

loop();

}

function resetGame(){
location.reload();
}

document.addEventListener("keydown",e=>{

if(e.code==="Space") jump();
if(e.key==="s") slide();

});

canvas.addEventListener("touchstart",jump);

function jump(){

if(!jumping){
player.vy=-14;
jumping=true;
}

}

function slide(){

player.h=20;

setTimeout(()=>{
player.h=40;
},400);

}

function spawnObstacle(){

obstacles.push({
x:900,
y:280,
w:40,
h:40
});

}

function spawnStar(){

stars.push({
x:900,
y:200,
r:10
});

}

function loop(){

if(!running) return;

ctx.clearRect(0,0,900,350);

player.vy+=gravity;
player.y+=player.vy;

if(player.y>260){
player.y=260;
jumping=false;
}

ctx.fillStyle="black";
ctx.fillRect(player.x,player.y,player.w,player.h);

if(Math.random()<0.02) spawnObstacle();
if(Math.random()<0.02) spawnStar();

for(let o of obstacles){

o.x-=speed;

ctx.fillRect(o.x,o.y,o.w,o.h);

if(player.x < o.x+o.w &&
player.x+player.w > o.x &&
player.y < o.y+o.h &&
player.y+player.h > o.y){

gameOver();
return;

}

}

for(let s of stars){

s.x-=speed;

ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fillStyle="orange";
ctx.fill();

if(Math.abs(player.x-s.x)<30 &&
Math.abs(player.y-s.y)<30){

score+=10;
s.x=-100;

}

}

score+=0.05;

document.getElementById("score").innerText=Math.floor(score);

requestAnimationFrame(loop);

}

function gameOver(){

running=false;

submitScore();

}

function submitScore(){

let name=document.getElementById("playerName").value;

if(!name){

alert("กรุณาใส่ชื่อ");

return;

}

fetch(API+"?name="+encodeURIComponent(name)+"&score="+Math.floor(score));

loadLeaderboard();

}

async function loadLeaderboard(){

const res=await fetch(API+"?action=top&limit=10");

const data=await res.json();

let board=document.getElementById("leaderboard");

board.innerHTML="";

data.top.forEach((p,i)=>{

let div=document.createElement("div");

div.innerHTML=(i+1)+". "+p.name+" — "+p.score;

board.appendChild(div);

});

}

loadLeaderboard();

</script>

</body>
</html>
